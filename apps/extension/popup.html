<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GambTroy</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #fff;
      margin: 0;
      padding: 1rem;
    }
    h1 {
      font-size: 1.25rem;
      margin-top: 0;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-card {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .status-badge.active {
      background: rgba(20, 184, 166, 0.2);
      color: #14b8a6;
      border: 1px solid #14b8a6;
    }
    .status-badge.inactive {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      box-sizing: border-box;
      background: #0f172a;
      border: 1px solid #475569;
      color: white;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    button {
      width: 100%;
      padding: 0.5rem;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    p.muted {
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <h1>🎯 GambTroy</h1>
  
  <div id="unauth-view">
    <p class="muted">Ingresa tu Token de Enlace desde el Dashboard para activar el escudo en este navegador.</p>
    <input type="password" id="token-input" placeholder="Pega tu token aquí..." />
    <button id="save-btn">Vincular Dispositivo</button>
  </div>

  <div id="auth-view" style="display: none;">
    <div class="status-card">
      <div style="margin-bottom: 0.5rem;">Estado de Protección</div>
      <div class="status-badge active" id="status-badge">ACTIVO</div>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
      <span class="muted">Sitios bloqueados:</span>
      <span id="block-count" style="font-weight: bold;">0</span>
    </div>
    <button id="sync-btn" style="background: #334155;">Sincronizar Manualmente</button>
    <button id="logout-btn" style="background: transparent; color: #ef4444; border: 1px solid #ef4444; margin-top: 0.5rem;">Forzar Desvinculación</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
